<svg xmlns="http://www.w3.org/2000/svg" width="240" height="72" viewBox="0 0 240 72">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F7B79"/>
      <stop offset="1" stop-color="#0A4A6A"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0EA5A6"/>
    </linearGradient>
  </defs>
  <!-- Icon tile -->
  <rect x="4" y="10" width="52" height="52" rx="14" fill="url(#g1)"/>
  <!-- Cross -->
  <g fill="#EAF7F6">
    <rect x="22" y="18" width="16" height="36" rx="5"/>
    <rect x="12" y="28" width="36" height="16" rx="5"/>
  </g>
  <!-- Pill overlay -->
  <g transform="translate(9,6) rotate(-18 28 28)">
    <rect x="30" y="26" width="22" height="12" rx="6" fill="url(#g2)"/>
    <rect x="30" y="32" width="11" height="6" rx="3" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="36" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="800" font-size="26" fill="#EAF7F6">SafeMed</text>
  <text x="72" y="56" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="600" font-size="14" fill="#A5E3DE">Concierge</text>
</svg>
